kind = "web"
previewPath = "/"
title = "Aurora Group"
version = "1.0.0"
id = "artifacts/aurora-group"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21551
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/aurora-group run dev"

[services.env]
PORT = "21551"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/aurora-group", "run", "build"]
publicDir = "artifacts/aurora-group/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
